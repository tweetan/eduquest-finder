<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KidSwap - Barter Kids Items</title>
    <meta name="description" content="Trade kids items with other families. Earn points, claim items, reduce waste!" />
    <meta name="author" content="KidSwap" />
    <meta property="og:image" content="/og-image.png" />
  </head>

  <body>
    <!-- Restore URL from 404.html SPA redirect (GitHub Pages) -->
    <script type="text/javascript">
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
    <div id="root"></div>
    <script src="https://cdn.gpteng.co/gptengineer.js" type="module"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
